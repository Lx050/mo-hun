<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>墨息</title>
    <style>
        :root {
            --paper: #f2f0e9;
            --ink: #1a1a1a;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--paper);
            overflow: hidden; touch-action: none;
            cursor: crosshair;
        }
        canvas { display: block; touch-action: none; background: transparent; }
        #ui {
            position: fixed; top: 20px; right: 20px;
            display: flex; gap: 10px; z-index: 10;
        }
        .btn {
            background: rgba(255,255,255,0.8); border: 1px solid #666;
            padding: 6px 16px; border-radius: 2px;
            font-family: "Noto Serif SC", serif; cursor: pointer;
            font-size: 13px; transition: all 0.2s;
        }
        .btn:hover { background: #1a1a1a; color: #fff; }
        #indicator {
            position: fixed; bottom: 20px; left: 20px;
            font-family: "Noto Serif SC", serif; font-size: 12px; color: #999;
            letter-spacing: 2px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="ui">
        <button class="btn" onclick="resetCanvas()">涤砚</button>
        <button class="btn" onclick="saveArt()">留墨</button>
        <button class="btn" onclick="saveTransparent()">导出透明PNG</button>
    </div>

    <div id="indicator">墨息</div>

    <canvas id="brushCanvas"></canvas>

    <script>
        const canvas = document.getElementById('brushCanvas');
        const ctx = canvas.getContext('2d', { alpha: true });

        let isDrawing = false;
        let lastX, lastY;
        let bristles = [];

        function initBristles(count) {
            bristles = [];
            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                const r = Math.pow(Math.random(), 1.5);
                bristles.push({
                    r: r,
                    theta: theta,
                    size: Math.random() * 0.4 + 0.3
                });
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // 不填充背景色，保持 Canvas 透明，纸张色由 CSS 提供
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function getMoveData(e) {
            const rect = canvas.getBoundingClientRect();
            let prs = e.pressure !== undefined && e.pressure !== 0 ? e.pressure : 0.5;
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top,
                pressure: prs
            };
        }

        function start(e) {
            isDrawing = true;
            const data = getMoveData(e);
            lastX = data.x;
            lastY = data.y;
            initBristles(40);
        }

        function move(e) {
            if (!isDrawing) return;
            const data = getMoveData(e);

            const dx = data.x - lastX;
            const dy = data.y - lastY;
            const distance = Math.hypot(dx, dy);
            if (distance < 0.5) return;

            const velocity = Math.min(distance / 8, 6);
            const pressure = data.pressure;
            const baseRadius = 1 + (pressure * 12);
            const steps = Math.ceil(distance / 0.5);

            for (let s = 0; s < steps; s++) {
                const t = s / steps;
                const curX = lastX + dx * t;
                const curY = lastY + dy * t;

                bristles.forEach(b => {
                    const offsetX = Math.cos(b.theta) * b.r * baseRadius;
                    const offsetY = Math.sin(b.theta) * b.r * baseRadius;

                    if (velocity > 1.2 && Math.random() < (velocity * 0.15)) return;

                    const alpha = (0.25 + (pressure * 0.45)) * (1 - velocity * 0.08);
                    if (alpha <= 0.01) return;

                    ctx.fillStyle = `rgba(26, 26, 26, ${alpha})`;

                    ctx.beginPath();
                    const pSize = b.size * (1 + pressure * 1.2);
                    ctx.ellipse(curX + offsetX, curY + offsetY, pSize, pSize * 0.7, Math.atan2(dy, dx), 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            lastX = data.x;
            lastY = data.y;
        }

        function end() {
            isDrawing = false;
        }

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 留墨：导出带纸张背景色的 PNG
        function saveArt() {
            var tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            var tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = '#f2f0e9';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0);
            tempCanvas.toBlob(function(blob) {
                if (!blob) return;
                var url = URL.createObjectURL(blob);
                var link = document.createElement('a');
                link.href = url;
                link.download = '墨息_留墨.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
            }, 'image/png');
        }

        // 导出透明PNG：纯墨迹，无背景
        function saveTransparent() {
            canvas.toBlob(function(blob) {
                if (!blob) return;
                var url = URL.createObjectURL(blob);
                var link = document.createElement('a');
                link.href = url;
                link.download = '墨息_透明.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
            }, 'image/png');
        }

        window.onload = () => {
            resize();
            window.addEventListener('resize', resize);
            canvas.addEventListener('pointerdown', start);
            window.addEventListener('pointermove', move);
            window.addEventListener('pointerup', end);
            canvas.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
